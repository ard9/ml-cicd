services:
  api:
    build:
      context: .
      secrets:
        - mlflow_creds
    image: ml-cicd-project-api:v2
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./models:/app/models
    environment:
      - PYTHONUNBUFFERED=1
    command: uvicorn src.api:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  # Run training on demand: `docker compose run --rm train`
  # Writes to ./models, which the api service mounts above, so a fresh
  # training run is picked up by the running API without a rebuild.
  train:
    build:
      context: .
      target: train
    image: ml-cicd-project-api:train
    env_file: .env
    volumes:
      - ./models:/app/models
      - ./mlruns:/mlruns
    command: python src/train.py
    profiles: ["tools"]
    depends_on: [mlflow]

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.15.1
    container_name: mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
      - ./mlflow-db:/mlflow-db
    command:
      - mlflow
      - server
      - --host
      - 0.0.0.0
      - --port
      - "5000"
      - --backend-store-uri
      - sqlite:////mlflow-db/mlflow.db
      - --artifacts-destination
      - /mlruns
      - --serve-artifacts
      - --gunicorn-opts
      - "--access-logfile - --error-logfile -"
secrets:
  mlflow_creds:
    file: ./mlflow_creds.txt

networks:
    ml-network:
      driver: bridge